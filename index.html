<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Sertifikasi Maslahah AI</title>
    <link id="theme-style" rel="stylesheet" href="css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Scheherazade:wght@400;700&display=swap');
        
        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-radius: 50px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .theme-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            background: transparent;
            color: inherit;
        }

        body.light-mode .theme-btn.light {
            background: #1e3a5f;
            color: white;
        }

        body.dark-mode .theme-btn.dark {
            background: #1e3a5f;
            color: white;
        }

        body.light-mode {
            background: linear-gradient(145deg, #f0f5fa 0%, #e6ecf3 100%);
        }

        body.dark-mode {
            background: linear-gradient(145deg, #0a1525 0%, #0d1b2f 100%);
        }

        body {
            transition: background 0.3s ease;
        }
    </style>
</head>
<body class="light-mode">
    <!-- Theme Toggle Button -->
    <div class="theme-toggle">
        <button class="theme-btn light" onclick="setTheme('light')">🌞 Light</button>
        <button class="theme-btn dark" onclick="setTheme('dark')">🌙 Dark</button>
    </div>

    <div class="container">
        <header>
            <div class="logo" style="margin-bottom: 20px;">م</div>
            <h1>Sertifikasi <span>Maslahah</span></h1>
            <p>Dewan Pengawas Etika & Sanad Digital</p>
        </header>
        
        <div class="search-box">
            <label>Verifikasi Sertifikat</label>
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Masukkan ID Produk (contoh: AI-ADAB-2026-001)">
                <button onclick="searchCertificate()">Verifikasi</button>
            </div>
        </div>
        
        <div class="info-panel">
            <h3>Kriteria Sertifikasi</h3>
            <ul>
                <li>Audit Adab & Etika AI</li>
                <li>Verifikasi Sanad Keilmuan</li>
                <li>Pengukuran Maslahat</li>
                <li>Bebas Dehumanisasi</li>
            </ul>
        </div>

        <!-- Statistik Sederhana -->
        <div style="display: flex; gap: 16px; margin-top: 24px; justify-content: center;">
            <div class="stat-item">
                <div class="stat-number">2</div>
                <div class="stat-label">Sertifikat Aktif</div>
            </div>
            <div style="width: 1px; background: rgba(52, 152, 219, 0.3);"></div>
            <div class="stat-item">
                <div class="stat-number">1447 H</div>
                <div class="stat-label">Tahun Hijriah</div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Fungsi untuk mengganti tema
        function setTheme(theme) {
            const body = document.body;
            const themeStyle = document.getElementById('theme-style');
            
            if (theme === 'dark') {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                themeStyle.href = 'css/style-dark.css';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                themeStyle.href = 'css/style.css';
                localStorage.setItem('theme', 'light');
            }
        }

        // Cek preferensi tema yang tersimpan
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        // Deteksi preferensi sistem
        if (!localStorage.getItem('theme')) {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            }
        }
    </script>
</body>
</html>
